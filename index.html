<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Designer Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <script src="index.js"></script>


    <nav class="navbar">
        <div class="logo">Supriya</span></div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Hi, I'm <span>Supriya Shretha</span></h1>
            <p>Crafting Digital Experiences with Precision & Creativity.</p>
            <a href="#projects" class="btn">View My Work</a>
        </div>
    </section>

    <section id="about" class="about">
        <h2>About Me</h2>
        <div class="about-container">
            <div class="about-text">
                <p>I am a passionate.and i am in  learning phase </p>
            </div>
        </div>
    </section>

    <section id="skills" class="skills">
        <h2>My Expertise</h2>
        <div class="skills-grid">
            <div class="skill-card">HTML/CSS</div>
            <div class="skill-card">JavaScript</div>
            <div class="skill-card">UI/UX Design</div>
        </div>
    </section>
        <div class="contact-form">
    <h2>Contact Us</h2>
    <form id="contactForm" novalidate>
        <input type="text" id="name" placeholder="Your Name">
        <div id="nameError" class="error"></div>

        <input type="email" id="email" placeholder="Your Email">
        <div id="emailError" class="error"></div>

        <textarea id="message" placeholder="Your Message" rows="4"></textarea>
        <div id="messageError" class="error"></div>

        <button type="submit">Send Message</button>
    </form>
</div>

    </section>

    
</body>
</html
